<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartAttend — {% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1e2d45;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
    .logo { padding: 24px 20px; border-bottom: 1px solid var(--border); }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent); }
    .logo-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
    .nav { padding: 16px 12px; flex: 1; }
    .nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 500; margin-bottom: 2px; transition: all 0.15s; }
    .nav a:hover, .nav a.active { background: var(--surface2); color: var(--text); }
    .nav a.active { border-left: 3px solid var(--accent); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-section { font-size: 10px; font-family: var(--mono); color: var(--muted); padding: 12px 12px 6px; letter-spacing: 1px; }

    /* Main */
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { padding: 16px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
    .page-title { font-size: 20px; font-weight: 600; }
    .content { padding: 32px; flex: 1; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-success { background: var(--green); color: #fff; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .form-input, .form-select { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; transition: border-color 0.15s; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    .form-select option { background: var(--surface); }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { padding: 12px 16px; text-align: left; font-size: 11px; font-family: var(--mono); color: var(--muted); letter-spacing: 1px; border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: var(--surface2); }

    /* Badges */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: var(--mono); }
    .badge-blue { background: rgba(59,130,246,0.15); color: var(--accent); }
    .badge-green { background: rgba(16,185,129,0.15); color: var(--green); }
    .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-orange { background: rgba(245,158,11,0.15); color: var(--orange); }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

    /* Stat cards */
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-val { font-size: 32px; font-weight: 700; font-family: var(--mono); color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Toast */
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 999; }
    .toast-msg { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; font-size: 14px; margin-top: 8px; animation: slideIn 0.2s ease; }
    .toast-success { border-left: 3px solid var(--green); }
    .toast-error { border-left: 3px solid var(--red); }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 480px; max-width: 95vw; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; }

    /* Loading */
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">Smart<span>Attend</span></div>
      <div class="logo-sub">Face Recognition System</div>
    </div>
    <nav class="nav">
      <div class="nav-section">OVERVIEW</div>
      <a href="/" class="{{ 'active' if request.path == '/' }}">
       Dashboard
      </a>
      <div class="nav-section">MANAGEMENT</div>
      <a href="/students" class="{{ 'active' if '/students' in request.path }}">
       Students
      </a>
      <a href="/subjects" class="{{ 'active' if '/subjects' in request.path }}">
        Subjects
      </a>
      <a href="/enroll" class="{{ 'active' if '/enroll' in request.path }}">
        Enroll Face
      </a>
      <div class="nav-section">LIVE</div>
      <a href="/attendance" class="{{ 'active' if '/attendance' in request.path }}">
        Take Attendance
      </a>
      
    </nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="page-title">{% block page_title %}{% endblock %}</div>
      <div style="font-size:13px; color:var(--muted); font-family:var(--mono)" id="clock"></div>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // Clock
    function tick() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleDateString('en-IN') + ' · ' + now.toLocaleTimeString('en-IN');
    }
    tick(); setInterval(tick, 1000);

    // Toast
    function toast(msg, type='success') {
      const t = document.getElementById('toast');
      const el = document.createElement('div');
      el.className = `toast-msg toast-${type}`;
      el.textContent = msg;
      t.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    // API helper
    async function api(method, url, body) {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined
      });
      return res.json();
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
